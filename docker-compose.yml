version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:6.0
    container_name: dollarsmaster-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongodb_data:/data/db
    networks:
      - dollarsmaster

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: dollarsmaster-redis
    ports:
      - "6379:6379"
    networks:
      - dollarsmaster

  # Backend API
  backend:
    build: ./backend
    container_name: dollarsmaster-backend
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      PORT: 5000
      DATABASE_URL: mongodb://root:password@mongodb:27017/dollarsmaster
      REDIS_URL: redis://redis:6379
      DERIV_APP_ID: ${DERIV_APP_ID}
      DERIV_API_KEY: ${DERIV_API_KEY}
      JWT_SECRET: ${JWT_SECRET}
      FRONTEND_URL: http://localhost:3000
    depends_on:
      - mongodb
      - redis
    networks:
      - dollarsmaster
    volumes:
      - ./backend:/app
      - /app/node_modules

  # Frontend
  frontend:
    build: ./frontend
    container_name: dollarsmaster-frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:5000/api
      REACT_APP_WS_URL: ws://localhost:5000
    depends_on:
      - backend
    networks:
      - dollarsmaster
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  mongodb_data:

networks:
  dollarsmaster:
    driver: bridge